<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Notice Board</title>
        <style>

            body {
                background-image: url(lap.jpg);
                background-size: cover;
                background-repeat: no-repeat;
                background-attachment: fixed;
                margin: 0;
                padding: 20px;
            }
            .back-btn {
                position: absolute;
                top: 20px;
                left: 20px;
                width: 40px;
                height: 40px;
                background-color: rgba(255, 255, 255, 0.2);
                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 50%;
                transition: 0.3s;
                overflow: hidden;
            }

            .back-btn img {
                width: 70%;
                height: auto;
                display: block;
            }

            .back-btn:hover {
                background-color: rgb(229, 231, 235);
                transform: scale(1.1);
            }

            .notice-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
            }

            .notice-container {
                background-color: rgba(255, 255, 255, 0.9);
                width: 100%;
                max-width: 800px;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
                border-top: 8px solid rgb(233, 147, 19);
                max-height: 80vh;
                overflow-y: auto;
            }

            h2 {
                color: rgba(233, 147, 19);
                font-family: fontP;
                font-size: 40px;
                text-align: center;
                margin-top: 0;
            }

            .notice-list {
                list-style: none;
                padding: 0;
                font-family: fontP;
            }

            .notice-list li {
                background: #f9f9f9;
                margin: 15px 0px;
                padding: 15px;
                border-left: 5px solid blueviolet;
                font-size: 20px;
                color: #333;
                border-radius: 5px;
            }

            .notice-list li span {
                background: red;
                color: white;
                font-size: 12px;
                padding: 2px 8px;
                border-radius: 3px;
                margin-right: 10px;
                vertical-align: middle;
            }

            @media (max-width: 768px) {

                body {
                    background-image: url(phone.jpg);
                }

                .notice-container{
                    width: 95%;
                    padding: 20px;
                    border-radius: 15px;
                }

                h2 {
                    font-size: 30px;
                }

                .notice-list li {
                    font-size: 16px;
                    padding: 12px;
                    margin: 10px 0px;
                }

                .back-btn {
                    padding: 12px 12px;
                    top: 10px;
                    left: 10px;
                }
            }
        </style>

    </head>
    <body>
        <a href="index.html" class="back-btn">
            <img src="back-ico.png" alt="back"> </a>

        <div class="notice-wrapper">
            <div class="notice-container">
                <h2>School Notices & Updates</h2> 
                <hr>
                <ul class="notice-list">
                    <li><span>NEW</span>Notice 0</li>
                    <li>Notice 1</li>
                    <li>Notice 2</li>
                    <li>Notice 3</li>
                </ul>
            </div>
        </div>    
    </body>
</html>
